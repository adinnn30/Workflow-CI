name: MLflow CI Skilled

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mlops:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting Skilled Pipeline for Adinda"

      - name: Run actions/checkout@v3
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn matplotlib

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_Adinda_Intan_Erlita.mlflow" >> $GITHUB_ENV

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          cd MLProject

          # Override tracking URI di modelling.py agar tidak pakai localhost
          sed -i 's|mlflow.set_tracking_uri("http://127.0.0.1:5000/")|mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])|g' modelling.py
          sed -i 's|mlflow.set_experiment("Latihan_Model_Basic")|mlflow.set_experiment("Basic_Model")|g' modelling.py

          # Pastikan import os ada
          sed -i '1s/^/import os\n/' modelling.py

          mlflow run . --env-manager=local --experiment-name "Basic_Model"

      - name: Get latest MLflow run_id
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          sleep 10

          RUN_ID=$(python -c "
          import mlflow, os
          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          runs = mlflow.search_runs(experiment_names=['Basic_Model'])
          print(runs.sort_values('start_time', ascending=False).iloc[0].run_id)
          ")

          echo "RUN_ID=$RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

          # Download semua artifacts dari DagsHub ke folder outputs
          mlflow artifacts download \
            --run-id "$RUN_ID" \
            --dst-path ./outputs

          echo "=== Isi outputs ==="
          find ./outputs -type f

      - name: Install Python dependencies
        run: echo "Verifying artifacts for GitHub Upload..."

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: MLflow-Results-Adinda
          path: ./outputs
          retention-days: 7

      - name: Post Set up Python 3.12.7
        run: echo "Cleaning up..."

      - name: Post Run actions/checkout@v3
        run: echo "Cleaning up..."

      - name: Complete job
        run: echo "Pipeline Finished - Check Summary tab for Artifacts"