name: MLflow Advanced CI

on:
  push:
    branches: [ main ]

jobs:
  mlops-advanced:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          pip install mlflow dagshub pandas scikit-learn matplotlib cloudpickle numpy

      - name: Run MLflow Project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          cd MLProject
          mlflow run . --env-manager=local --experiment-name "Model_Tuning_Advanced"

      - name: Download Artifacts
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          RUN_ID=$(python -c "import mlflow; mlflow.set_tracking_uri('https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_Adinda_Intan_Erlita.mlflow'); print(mlflow.search_runs(experiment_names=['Model_Tuning_Advanced']).sort_values('start_time', ascending=False).iloc[0].run_id)")
          mlflow artifacts download --run-id $RUN_ID --dst-path ./outputs

      - name: Build and Push Docker
        run: |
          MODEL_PATH=$(find ./outputs -iname "MLmodel" | head -n 1 | xargs dirname)
          mlflow models build-docker -m "$MODEL_PATH" -n sentiment-model
          
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u iamaie --password-stdin
          docker tag sentiment-model iamaie/sentiment-model:latest
          docker push iamaie/sentiment-model:latest
