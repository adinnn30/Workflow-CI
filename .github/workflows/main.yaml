name: MLflow CI Skilled

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mlops:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==3.11.1 pandas==2.3.3 scikit-learn==1.8.0 matplotlib cloudpickle numpy

      - name: Run MLflow Local Server
        run: |
          # Menjalankan server di background agar port 5000 aktif
          mlflow ui --port 5000 &
          sleep 15

      - name: Run modelling.py
        run: |
          # Berpindah ke folder project dan eksekusi
          cd MLProject
          python modelling.py

      - name: Prepare Artifacts
        run: |
          mkdir -p outputs
          # Perbaikan Path: Mengambil mlruns dari dalam folder MLProject
          if [ -d "MLProject/mlruns" ]; then
            cp -r MLProject/mlruns/* outputs/
            echo "Artifacts found in MLProject/mlruns"
          else
            echo "Error: mlruns directory not found!"
            exit 1
          fi

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: MLflow-Results-Adinda
          path: outputs/
          retention-days: 7
