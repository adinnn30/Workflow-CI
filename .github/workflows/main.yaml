name: MLflow CI CD Advanced

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  mlops:
    runs-on: ubuntu-latest

    steps:
      - name: Set up job
        run: echo "Starting Skilled Pipeline for Adinda"

      - name: Run actions/checkout@v3
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow dagshub pandas scikit-learn matplotlib

      - name: Set MLflow Tracking URI
        run: |
          echo "MLFLOW_TRACKING_URI=https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_Adinda_Intan_Erlita.mlflow" >> $GITHUB_ENV

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          cd MLProject
          sed -i 's|mlflow.set_tracking_uri("http://127.0.0.1:5000/")|mlflow.set_tracking_uri(os.environ["MLFLOW_TRACKING_URI"])|g' modelling.py
          sed -i 's|mlflow.set_experiment("Latihan_Model_Basic")|mlflow.set_experiment("Basic_Model")|g' modelling.py
          sed -i '1s/^/import os\n/' modelling.py
          mlflow run . --env-manager=local --experiment-name "Basic_Model"

      - name: Get latest MLflow run_id
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          sleep 10

          RUN_ID=$(python -c "
          import mlflow, os
          mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])
          runs = mlflow.search_runs(experiment_names=['Basic_Model'])
          print(runs.sort_values('start_time', ascending=False).iloc[0].run_id)
          ")

          echo "RUN_ID=$RUN_ID"
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

          mlflow artifacts download \
            --run-id "$RUN_ID" \
            --dst-path ./outputs

          echo "=== Isi outputs ==="
          find ./outputs -type f

      - name: Install Python dependencies
        run: echo "Verifying artifacts for GitHub Upload..."

      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: MLflow-Results-Adinda
          path: ./outputs
          retention-days: 7

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
        run: |
          python -c "
import mlflow, os
mlflow.set_tracking_uri(os.environ['MLFLOW_TRACKING_URI'])

run_id = os.environ['RUN_ID']
print(f'Loading model from run: {run_id}')

client = mlflow.tracking.MlflowClient()
artifacts = client.list_artifacts(run_id)
print('=== Artifacts di DagsHub ===')
for a in artifacts:
    print(f'  {a.path} (is_dir={a.is_dir})')
    if a.is_dir:
        sub = client.list_artifacts(run_id, a.path)
        for s in sub:
            print(f'    {s.path}')

for a in artifacts:
    if a.is_dir:
        print(f'Downloading folder: {a.path}')
        mlflow.artifacts.download_artifacts(
            run_id=run_id,
            artifact_path=a.path,
            dst_path=f'./model_dir/{a.path}'
        )
"
          echo "=== Struktur model_dir ==="
          find ./model_dir -type f

          MODEL_PATH=$(find ./model_dir -type f -name "MLmodel" -print0 \
            | xargs -0 -I{} dirname {} \
            | head -n 1)

          echo "MODEL_PATH=$MODEL_PATH"

          if [ -z "$MODEL_PATH" ]; then
            echo "ERROR: MLmodel tidak ditemukan"
            echo "Kemungkinan log_model tidak tersimpan ke DagsHub"
            echo "Cek modelling.py apakah mlflow.sklearn.log_model() dipanggil di dalam with mlflow.start_run()"
            exit 1
          fi

          mlflow models build-docker \
            -m "$MODEL_PATH" \
            -n sentiment-model \
            --enable-mlserver

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag sentiment-model \
            ${{ secrets.DOCKER_USERNAME }}/sentiment-model:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/sentiment-model:latest

      - name: Complete job
        run: echo "Advanced Pipeline Finished Successfully"